<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <link rel="icon" href="data:,">
    <title>仙剑奇侠传 · 网页版</title>
    <style>
      * { margin:0; padding:0; box-sizing:border-box; }
      html, body {
        width:100%; height:100%; overflow:hidden;
        background:#0a0a0a; color:#ccc;
        font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
        touch-action: none;
        -webkit-user-select: none; user-select: none;
      }

      /* Main Menu */
      #mainMenu {
        position:fixed; top:0; left:0; width:100%; height:100%;
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        background:linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
        z-index:9999;
        text-align:center;
        padding:20px;
      }
      #mainMenu .menu-icon { width:72px; height:72px; margin-bottom:12px; border-radius:14px; box-shadow:0 0 40px rgba(44,180,100,0.25); image-rendering:pixelated; }
      #mainMenu h1 { font-size:28px; font-weight:700; letter-spacing:3px; background:linear-gradient(90deg,#2cb464,#4ae08a); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:4px; }
      #mainMenu .subtitle { font-size:14px; color:#555; margin-bottom:32px; }
      .menu-btn { display:block; width:220px; max-width:80vw; padding:14px 0; margin:8px auto; font-size:17px; font-weight:600; border:none; border-radius:10px; cursor:pointer; transition:all 0.2s ease; outline:none; }
      .menu-btn:active { transform:scale(0.96); }
      .btn-start { background:linear-gradient(90deg,#2cb464,#38d67a); color:#fff; box-shadow:0 4px 20px rgba(44,180,100,0.35); }
      .btn-settings { background:rgba(255,255,255,0.08); color:#888; font-size:14px; padding:10px 0; }
      #mainMenu .footer { position:fixed; bottom:20px; font-size:12px; color:#333; letter-spacing:1px; }
      #mainMenu .footer span { color:#2cb464; }

      /* Loading Screen */
      #loadingScreen {
        position:fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; align-items:center; justify-content:center; background:#0a0a0a; z-index:9998; text-align:center; padding:20px;
      }
      #loadingScreen.active { display:flex; }
      #loadingScreen h2 { font-size:18px; font-weight:600; color:#2cb464; margin-bottom:20px; }
      .progress-wrap { width:280px; max-width:80vw; }
      .progress-track { width:100%; height:4px; background:#222; border-radius:2px; overflow:hidden; }
      .progress-fill { height:100%; width:0%; background:linear-gradient(90deg,#2cb464,#4ae08a); border-radius:2px; transition:width 0.35s ease; }
      .progress-label { display:flex; justify-content:space-between; margin-top:8px; font-size:12px; color:#555; }
      .progress-pct { font-size:20px; font-weight:700; color:#2cb464; margin-top:8px; }
      .status-text { font-size:13px; color:#777; margin-top:10px; min-height:18px; }

      /* Game Canvas */
      #canvas { display:block; position:fixed; top:0; left:0; width:100%; height:100%; image-rendering:pixelated; }

      /* Virtual Controller */
      #vcontroller {
        position:fixed; top:0; left:0; width:100%; height:100%;
        z-index:100; pointer-events:none;
        display:none;
      }
      #vcontroller.active { display:block; }
      #vcontroller .ctrl-btn {
        position:absolute; pointer-events:auto;
        border-radius:50%;
        background:rgba(255,255,255,0.12);
        border:2px solid rgba(255,255,255,0.2);
        display:flex; align-items:center; justify-content:center;
        font-size:22px; color:rgba(255,255,255,0.6);
        -webkit-tap-highlight-color:transparent;
        transition:background 0.1s;
        user-select:none;
        touch-action:none;
      }
      #vcontroller .ctrl-btn:active,
      #vcontroller .ctrl-btn.pressed { background:rgba(255,255,255,0.25); border-color:rgba(255,255,255,0.4); }

      /* D-pad */
      .dpad { width:140px; height:140px; position:absolute; bottom:30px; left:12px; }
      .dpad .ctrl-btn { width:44px; height:44px; }
      .dpad-up { top:0; left:48px; }
      .dpad-down { bottom:0; left:48px; }
      .dpad-left { left:0; top:48px; }
      .dpad-right { right:0; top:48px; }

      /* Action buttons */
      .btn-a { width:60px; height:60px; bottom:30px; right:20px; font-size:26px; border-color:rgba(44,180,100,0.4); color:#4ae08a; }
      .btn-b { width:50px; height:50px; bottom:70px; right:80px; font-size:20px; border-color:rgba(255,100,100,0.3); color:#ff6666; }
      .btn-y { width:44px; height:44px; bottom:30px; right:95px; font-size:14px; border-color:rgba(255,200,50,0.3); color:#ffcc33; }
      .btn-menu { width:44px; height:44px; top:10px; right:10px; font-size:16px; border-color:rgba(255,255,255,0.15); }

      @media (max-width:480px) {
        #mainMenu h1 { font-size:22px; }
        #mainMenu .menu-icon { width:56px; height:56px; }
        .menu-btn { width:200px; padding:12px 0; font-size:15px; }
        .dpad { width:120px; height:120px; }
        .dpad .ctrl-btn { width:38px; height:38px; font-size:18px; }
        .btn-a { width:52px; height:52px; right:14px; font-size:22px; }
        .btn-b { width:44px; height:44px; right:68px; bottom:58px; font-size:18px; }
        .btn-y { width:38px; height:38px; right:80px; bottom:20px; font-size:12px; }
      }
    </style>
  </head>
  <body>
    <!-- Main Menu -->
    <div id="mainMenu">
      <img src="icon.png" class="menu-icon" alt="logo">
      <h1>仙剑奇侠传</h1>
      <div class="subtitle">网页 Mod 版</div>
      <button class="menu-btn btn-start" onclick="startGame()">开始游戏</button>
      <button class="menu-btn btn-settings" onclick="alert('设置功能开发中')">游戏设置</button>
      <div class="footer">Design by <span>Mark</span></div>
    </div>

    <!-- Loading Screen -->
    <div id="loadingScreen">
      <h2>正在加载游戏资源</h2>
      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-pct" id="progressPct">0%</div>
        <div class="progress-label">
          <span id="statusText">准备中...</span>
          <span id="progressDetail"></span>
        </div>
      </div>
    </div>

    <!-- Game Canvas -->
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>

    <!-- Virtual Controller -->
    <div id="vcontroller">
      <!-- D-pad -->
      <div class="dpad" id="dpad">
        <div class="ctrl-btn dpad-up"    data-key="ArrowUp">&#9650;</div>
        <div class="ctrl-btn dpad-down"  data-key="ArrowDown">&#9660;</div>
        <div class="ctrl-btn dpad-left"  data-key="ArrowLeft">&#9664;</div>
        <div class="ctrl-btn dpad-right" data-key="ArrowRight">&#9654;</div>
      </div>
      <!-- Action Buttons -->
      <div class="ctrl-btn btn-a"    data-key="Enter">A</div>
      <div class="ctrl-btn btn-b"    data-key="Escape">B</div>
      <div class="ctrl-btn btn-y"    data-key="y">Y</div>
      <div class="ctrl-btn btn-menu" data-key="Escape" id="btnMenu">&#8942;</div>
    </div>

    <script type="text/javascript" src="jszip.min.js"></script>
    <script type="text/javascript" src="main.js"></script>
  </body>
</html>
